<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>약국 재고관리</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root {
  --bg:#f0f4f8;--surface:#fff;--surface2:#f7f9fc;--border:#e3e8ef;
  --text:#1a202c;--text2:#5a6a7e;--text3:#9aacbe;
  --in:#2563eb;--in-bg:#eff6ff;
  --out:#ea580c;--out-bg:#fff7ed;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;--red-bg:#fef2f2;
  --yellow:#d97706;--yellow-bg:#fffbeb;
  --accent:#7c3aed;--accent-bg:#f5f3ff;
  --radius:14px;--radius-sm:9px;
  --mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;padding-bottom:90px}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 18px 0;position:sticky;top:0;z-index:100}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.logo{display:flex;align-items:center;gap:9px}
.logo-mark{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-name{font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text3)}
.sheet-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 10px;cursor:pointer}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);transition:background .3s}
.dot.on{background:var(--green)}
.tabs{display:flex}
.tab{flex:1;padding:10px 0;font-size:13px;font-weight:500;font-family:var(--sans);border:none;background:transparent;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active-in{color:var(--in);border-color:var(--in)}
.tab.active-out{color:var(--out);border-color:var(--out)}
.tab.active-hist{color:var(--accent);border-color:var(--accent)}
.tab.active-cfg{color:var(--text2);border-color:var(--text2)}

.content{padding:16px 16px 0}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}

/* Scan + Search */
.scan-search-row{display:flex;gap:8px;margin-bottom:14px}
.scan-btn{flex:1;padding:16px 12px;background:var(--surface);border:2px dashed var(--border);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .18s}
.scan-btn:active{transform:scale(.98)}
.scan-btn.in{border-color:var(--in);background:var(--in-bg)}
.scan-btn.out{border-color:var(--out);background:var(--out-bg)}
.scan-icon{font-size:28px}
.scan-text{font-size:12px;font-weight:600}

/* Search Box */
.search-box{flex:1;position:relative}
.search-input{width:100%;height:100%;min-height:80px;padding:12px;border:2px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--sans);background:var(--surface);outline:none;color:var(--text);resize:none}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}
.search-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:50;max-height:240px;overflow-y:auto;display:none}
.search-dropdown.open{display:block}
.sd-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.sd-item:last-child{border-bottom:none}
.sd-item:active{background:var(--accent-bg)}
.sd-name{font-size:13px;font-weight:600}
.sd-bc{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.sd-empty{padding:12px;text-align:center;font-size:12px;color:var(--text3)}

/* Lookup */
.lookup-status{display:none;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px;font-size:12px;color:var(--text2)}
.lookup-status.show{display:flex}
.lookup-spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pending */
.pending-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pending-count{font-size:12px;font-weight:600}
.pending-count.in{color:var(--in)}.pending-count.out{color:var(--out)}
.clear-all-btn{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer}
.pending-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}

/* Pending Item */
.pending-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.pending-item.in-item{border-left:3px solid var(--in)}
.pending-item.out-item{border-left:3px solid var(--out)}
.pi-top{display:flex;align-items:center;padding:12px 12px 8px;gap:10px}
.pi-icon{font-size:18px;flex-shrink:0}
.pi-info{flex:1;min-width:0}
.pi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-name-input{font-size:13px;font-weight:600;border:none;border-bottom:2px solid var(--in);outline:none;font-family:var(--sans);width:100%;background:transparent;padding:2px 0}
.pi-barcode{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:1px}
.pi-source{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600;margin-top:2px;display:inline-block}
.pi-source.local{background:var(--accent-bg);color:var(--accent)}
.pi-source.new{background:#fef9c3;color:#92400e}
.pi-del-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--red);flex-shrink:0}

/* 참고사항 */
.pi-memo{display:flex;align-items:center;gap:6px;padding:0 12px 8px}
.pi-memo-label{font-size:10px;color:var(--text3);flex-shrink:0;font-weight:600}
.pi-memo-input{flex:1;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);background:var(--yellow-bg);color:var(--text);outline:none}
.pi-memo-input:focus{border-color:var(--yellow)}
.pi-memo-save{font-size:10px;padding:5px 8px;background:var(--yellow);color:white;border:none;border-radius:6px;cursor:pointer;font-family:var(--sans);white-space:nowrap;flex-shrink:0}

/* 단위 탭 */
.pi-units{padding:0 12px 12px}
.unit-tabs-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.unit-tab{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:20px;border:2px solid var(--border);background:var(--surface2);cursor:pointer;transition:all .15s;font-family:var(--sans)}
.unit-tab:active{transform:scale(.96)}
.unit-tab.sel-in{border-color:var(--in);background:var(--in-bg)}
.unit-tab.sel-out{border-color:var(--out);background:var(--out-bg)}
.ut-name{font-size:12px;font-weight:600;color:var(--text)}
.ut-stock{font-size:10px;color:var(--text3)}
.unit-tab.sel-in .ut-name{color:var(--in)}
.unit-tab.sel-out .ut-name{color:var(--out)}
.unit-add-btn{padding:7px 10px;border-radius:20px;border:2px dashed var(--border);background:transparent;cursor:pointer;font-size:11px;color:var(--text3);font-family:var(--sans);transition:all .15s;white-space:nowrap}

/* 단위 추가 패널 */
.unit-add-panel{background:var(--accent-bg);border:1px solid #ddd6fe;border-radius:10px;padding:10px 12px;margin-bottom:8px;display:none}
.unit-add-panel.open{display:block}
.uap-title{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:8px}
.uap-row{display:flex;gap:6px;margin-bottom:6px}
.uap-input{flex:1;padding:7px 9px;border:1px solid #ddd6fe;border-radius:7px;font-size:13px;font-family:var(--mono);background:var(--surface);outline:none;color:var(--text)}
.uap-input:focus{border-color:var(--accent)}
.uap-hint{font-size:10px;color:var(--accent);margin-bottom:6px}
.uap-save{width:100%;padding:8px;background:var(--accent);color:white;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans)}

/* 수량 입력 */
.unit-qty-box{background:var(--surface2);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px}
.uqb-info{flex:1;min-width:0;display:flex;align-items:center;gap:6px}
.uqb-label{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.uqb-stock{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0}
.uqb-stock.warn{color:var(--red)}
.qty-stepper{display:flex;align-items:center;flex-shrink:0}
.qs-btn{width:28px;height:28px;border:none;background:transparent;font-size:18px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;border-radius:6px}
.qs-btn:active{background:var(--border)}
.qs-val{font-family:var(--mono);font-size:16px;font-weight:700;min-width:28px;width:28px;text-align:center;border:none;background:transparent;outline:none;color:var(--text)}
.unit-extra{padding:8px 12px 10px;display:flex;align-items:center;gap:8px;border-top:1px dashed var(--border)}
.ue-label{font-size:12px;color:var(--text2);flex:1;display:flex;align-items:center;gap:6px;white-space:nowrap;min-width:0}
.ue-stock{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0}

/* Confirm bar */
.confirm-bar{position:sticky;bottom:82px;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;display:none;max-width:480px;margin:0 auto;z-index:90}
.confirm-bar.show{display:block}
.cb-summary{font-size:12px;color:var(--text2);margin-bottom:10px}
.cb-btn{width:100%;padding:14px;border:none;border-radius:var(--radius);font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .18s}
.cb-btn:active{transform:scale(.98)}
.cb-btn.in{background:var(--in);color:white}
.cb-btn.out{background:var(--out);color:white}
.cb-btn:disabled{opacity:.45}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:none}

/* Camera */
.camera-wrap{display:none;position:fixed;inset:0;background:#000;z-index:200;flex-direction:column}
.camera-wrap.open{display:flex}
#scanner-view{flex:1;position:relative;overflow:hidden}
.scan-ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{width:270px;height:150px;border:2px solid rgba(255,255,255,.7);border-radius:12px;position:relative;box-shadow:0 0 0 9999px rgba(0,0,0,.55)}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#2563eb,transparent);animation:sl 1.8s linear infinite}
@keyframes sl{0%{top:0}100%{top:100%}}
.corner{position:absolute;width:18px;height:18px;border-color:#2563eb;border-style:solid;border-width:0}
.corner.tl{top:-2px;left:-2px;border-top-width:3px;border-left-width:3px;border-radius:4px 0 0 0}
.corner.tr{top:-2px;right:-2px;border-top-width:3px;border-right-width:3px;border-radius:0 4px 0 0}
.corner.bl{bottom:-2px;left:-2px;border-bottom-width:3px;border-left-width:3px;border-radius:0 0 0 4px}
.corner.br{bottom:-2px;right:-2px;border-bottom-width:3px;border-right-width:3px;border-radius:0 0 4px 0}
.scan-hint{color:rgba(255,255,255,.85);font-size:13px;margin-top:22px}
.cam-close{position:absolute;top:20px;right:20px;width:40px;height:40px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:50%;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;pointer-events:all}
.cam-mode-badge{position:absolute;top:20px;left:20px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:20px;color:white;font-size:12px;font-weight:600;padding:6px 14px;pointer-events:all}
.cam-mode-badge.in{border-color:rgba(37,99,235,.6);color:#93c5fd}
.cam-mode-badge.out{border-color:rgba(234,88,12,.6);color:#fed7aa}
.cam-bottom{background:rgba(0,0,0,.8);padding:14px 16px;display:flex;gap:10px;pointer-events:all}
.cam-input{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:white;padding:10px 14px;font-size:14px;font-family:var(--mono)}
.cam-input::placeholder{color:rgba(255,255,255,.35)}
.cam-ok{background:var(--in);border:none;border-radius:8px;color:white;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer}

/* History */
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:7px}
.hi-badge{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.hi-badge.in{background:var(--in-bg)}.hi-badge.out{background:var(--out-bg)}
.hi-body{flex:1;min-width:0}
.hi-name{font-size:13px;font-weight:600}
.hi-meta{font-size:11px;color:var(--text3);margin-top:2px}
.hi-qty{font-family:var(--mono);font-size:13px;font-weight:700;flex-shrink:0;text-align:right;line-height:1.6}
.hi-qty.in{color:var(--in)}.hi-qty.out{color:var(--out)}

/* Settings */
.url-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.url-card-title{font-size:13px;font-weight:600;margin-bottom:10px}
.url-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-family:var(--mono);background:var(--surface2);outline:none;color:var(--text);margin-bottom:8px}
.url-input:focus{border-color:var(--accent)}
.url-save{width:100%;padding:10px;background:var(--accent);color:white;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer}
.file-upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;margin-bottom:8px}
.file-upload-area.has-file{border-color:var(--green);background:var(--green-bg)}
.file-icon{font-size:28px;margin-bottom:8px}.file-text{font-size:13px;font-weight:600;margin-bottom:4px}.file-sub{font-size:11px;color:var(--text2)}
.file-status{font-size:12px;color:var(--green);font-weight:600;margin-top:6px}
.file-input{display:none}

.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}.empty-text{font-size:13px;line-height:1.6}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:white;padding:11px 20px;border-radius:30px;font-size:13px;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;max-width:calc(100% - 32px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}.toast.warn{background:var(--yellow)}

.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;max-width:480px;margin:0 auto;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;background:none;border:none;cursor:pointer;color:var(--text3);font-family:var(--sans)}
.nav-btn.a-in{color:var(--in)}.nav-btn.a-out{color:var(--out)}.nav-btn.a-hist{color:var(--accent)}.nav-btn.a-cfg{color:var(--text2)}
.nav-icon{font-size:21px}.nav-label{font-size:10px;font-weight:500}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="logo">
      <div class="logo-mark">💊</div>
      <div><div class="logo-name">약국 재고관리</div><div class="logo-sub">v6 Final</div></div>
    </div>
    <div class="sheet-pill" onclick="goMode('cfg')">
      <div class="dot" id="sheetDot"></div><span id="sheetTxt">시트 연결</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab" id="tab-in"   onclick="goMode('in')">📦 입고</button>
    <button class="tab" id="tab-out"  onclick="goMode('out')">📤 출고</button>
    <button class="tab" id="tab-hist" onclick="goMode('hist')">📋 이력</button>
    <button class="tab" id="tab-cfg"  onclick="goMode('cfg')">⚙️ 설정</button>
  </div>
</div>

<!-- IN -->
<div class="content" id="view-in" style="display:none">
  <div class="scan-search-row">
    <button class="scan-btn in" onclick="openCam('in')">
      <div class="scan-icon">📷</div>
      <div class="scan-text" style="color:var(--in)">입고 스캔</div>
    </button>
    <div class="search-box">
      <input class="search-input" id="search-in" placeholder="🔍 상품명 검색&#10;(바코드 못 찍을 때)"
        oninput="onSearch('in',this.value)" onkeydown="onSearchKey('in',event)" autocomplete="off">
      <div class="search-dropdown" id="sdrop-in"></div>
    </div>
  </div>
  <div class="lookup-status" id="lookup-in"><div class="lookup-spinner"></div><span id="lookup-in-text">조회 중...</span></div>
  <div id="in-pending-header" class="pending-header" style="display:none">
    <div class="sec-label" style="margin:0">스캔 목록</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="pending-count in" id="in-count"></span>
      <button class="clear-all-btn" onclick="clearAll('in')">전체 삭제</button>
    </div>
  </div>
  <div class="pending-list" id="in-list"></div>
  <div id="in-empty" class="empty"><div class="empty-icon">📦</div><div class="empty-text">바코드를 스캔하거나<br>상품명으로 검색하세요</div></div>
</div>

<!-- OUT -->
<div class="content" id="view-out" style="display:none">
  <div class="scan-search-row">
    <button class="scan-btn out" onclick="openCam('out')">
      <div class="scan-icon">📷</div>
      <div class="scan-text" style="color:var(--out)">출고 스캔</div>
    </button>
    <div class="search-box">
      <input class="search-input" id="search-out" placeholder="🔍 상품명 검색&#10;(바코드 못 찍을 때)"
        oninput="onSearch('out',this.value)" onkeydown="onSearchKey('out',event)" autocomplete="off">
      <div class="search-dropdown" id="sdrop-out"></div>
    </div>
  </div>
  <div class="lookup-status" id="lookup-out"><div class="lookup-spinner"></div><span id="lookup-out-text">조회 중...</span></div>
  <div id="out-pending-header" class="pending-header" style="display:none">
    <div class="sec-label" style="margin:0">스캔 목록</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="pending-count out" id="out-count"></span>
      <button class="clear-all-btn" onclick="clearAll('out')">전체 삭제</button>
    </div>
  </div>
  <div class="pending-list" id="out-list"></div>
  <div id="out-empty" class="empty"><div class="empty-icon">📤</div><div class="empty-text">바코드를 스캔하거나<br>상품명으로 검색하세요</div></div>
</div>

<!-- HISTORY -->
<div class="content" id="view-hist" style="display:none">

<script>
// ═══════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════
const DEFAULT_URL = 'https://pharmacy-proxy.asteria2hyun.workers.dev';
let mode='in', scanMode='in', isScanning=false;
let products  = JSON.parse(localStorage.getItem('phProducts') || '{}');
let histLog   = JSON.parse(localStorage.getItem('phHistory')  || '[]');
let sheetUrl  = localStorage.getItem('phSheetUrl') || DEFAULT_URL;
let backData  = JSON.parse(localStorage.getItem('phBackData') || '{}');
let sheetCache = {}; // 바코드 → 시트 데이터 캐시
let allSheetProducts = []; // 검색용 전체 상품 목록
let pendingIn=[], pendingOut=[];
let searchCursor = {in:-1, out:-1};
let cacheReady = false;


// ═══════════════════════════════════════
// 바코드 정규화
// 어떤 형식이든 EAN-13으로 변환
// ═══════════════════════════════════════
function normalizeBarcode(raw) {
  // 숫자와 괄호만 남기고 모두 제거
  let s = String(raw||'').trim().replace(/[^0-9()]/g, '');
  // 괄호 제거
  s = s.replace(/[()]/g, '');
  const len = s.length;
  // 16자리: 01 + 14자리 → 뒤 13자리
  if (len === 16 && s.startsWith('01')) return s.slice(3);
  // 15자리: 01 + 13자리
  if (len === 15 && s.startsWith('01')) return s.slice(2);
  // 14자리: 0 + 13자리
  if (len === 14 && s.startsWith('0')) return s.slice(1);
  // 13자리: 그대로
  return s;
}

// 바코드로 시트에서 검색할 때 여러 형식 시도
function getBarcodeVariants(barcode) {
  const norm = normalizeBarcode(barcode);
  const variants = new Set([barcode, norm]);
  // 2로 시작하면 88로 변환 시도
  if (norm.startsWith('2') && norm.length === 13) {
    variants.add('88' + norm.slice(3));
  }
  // 88로 시작하면 2로 변환 시도
  if (norm.startsWith('88') && norm.length === 13) {
    variants.add('2' + norm.slice(3, 13));
  }
  // 앞자리 잘린 경우 대응: 끝 8자리로 시트 상품과 매칭
  if (norm.length >= 8) {
    const suffix = norm.slice(-8);
    for (const p of allSheetProducts) {
      if (!p.barcode) continue;
      const pnorm = normalizeBarcode(p.barcode);
      if (pnorm.endsWith(suffix) && pnorm !== norm) variants.add(pnorm);
      // extraBarcodes도 확인
      if (p.extraBarcodes) {
        for (const eb of p.extraBarcodes) {
          const ebnorm = normalizeBarcode(eb);
          if (ebnorm.endsWith(suffix) && ebnorm !== norm) variants.add(ebnorm);
        }
      }
    }
  }
  return [...variants];
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init() {
  goMode('in');
  updateSheetStatus();
  if (sheetUrl) document.getElementById('urlInput').value = sheetUrl;
  updateFileStatus();
  // 로컬 캐시 있으면 즉시 사용
  const cached = localStorage.getItem('phProductCache');
  if (cached) {
    try { allSheetProducts = JSON.parse(cached); cacheReady = true; } catch(e) {}
  }
  // 백그라운드로 최신 데이터 로드
  loadAllProducts();
}

async function loadAllProducts() {
  if (!sheetUrl) return;
  // 로컬 캐시 먼저 사용 (즉시 검색 가능)
  const cached = localStorage.getItem('phProductCache');
  if (cached) {
    try {
      allSheetProducts = JSON.parse(cached);
    } catch(e) {}
  }
  // 백그라운드에서 최신 데이터 로드
  try {
    const data = await jsonpFetch(`${sheetUrl}?action=getAll`);
    if (data && data.success && data.products) {
      allSheetProducts = data.products;
      localStorage.setItem('phProductCache', JSON.stringify(data.products));
    }
  } catch(e) {}
  // 캐시 로드 완료 표시
  cacheReady = true;
}

function jsonpFetch(url) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now();
    const script = document.createElement('script');
    window[cbName] = function(data) {
      delete window[cbName];
      document.head.removeChild(script);
      resolve(data);
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    script.onerror = () => {
      delete window[cbName];
      document.head.removeChild(script);
      // JSONP 실패시 fetch로 재시도
      fetch(url, {mode: 'cors', redirect: 'follow'})
        .then(r => r.json())
        .then(resolve)
        .catch(reject);
    };
    document.head.appendChild(script);
  });
}

// ═══════════════════════════════════════
// MODE
// ═══════════════════════════════════════
function goMode(m) {
  mode = m;
  ['in','out','hist','cfg'].forEach(x => {
    document.getElementById('view-'+x).style.display='none';
    document.getElementById('tab-'+x).className='tab';
    document.getElementById('nav-'+x).className='nav-btn';
    if (x==='in'||x==='out') document.getElementById('cb-'+x).classList.remove('show');
  });
  document.getElementById('view-'+m).style.display='block';
  const tm={in:'active-in',out:'active-out',hist:'active-hist',cfg:'active-cfg'};
  const nm={in:'a-in',out:'a-out',hist:'a-hist',cfg:'a-cfg'};
  document.getElementById('tab-'+m).classList.add(tm[m]);
  document.getElementById('nav-'+m).classList.add(nm[m]);
  if (m==='in'||m==='out') renderPending(m);
  if (m==='hist') renderHistory();
}

// ═══════════════════════════════════════
// 검색창
// ═══════════════════════════════════════
function onSearch(m, query) {
  const drop = document.getElementById('sdrop-'+m);
  searchCursor[m] = -1;
  if (!query.trim()) { drop.classList.remove('open'); return; }
  const q = query.toLowerCase().trim();

  // 검색 소스: 시트캐시 + 백데이터 합치기
  const allSources = [
    ...allSheetProducts,
    ...Object.entries(backData).map(([bc, v]) => ({barcode: bc, name: v.name}))
  ];

  // 중복 제거 (상품명 기준)
  const seen = new Set();
  const unique = allSources.filter(p => {
    if (!p.name || seen.has(p.name)) return false;
    seen.add(p.name);
    return true;
  });

  // 검색 - 점수 기반 정렬
  const scored = unique.map(p => {
    const name = p.name.toLowerCase();
    let score = 0;
    if (name === q) score = 100;
    else if (name.startsWith(q)) score = 80;
    else if (name.includes(q)) score = 60;
    // 단어 단위 검색
    else if (q.split('').every(c => name.includes(c))) score = 30;
    return { ...p, score };
  }).filter(p => p.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 12);

  if (!scored.length) {
    drop.innerHTML = '<div class="sd-empty">검색 결과 없음</div>';
    drop.classList.add('open');
    return;
  }

  drop.innerHTML = scored.map((p, i) => `
    <div class="sd-item" id="sdi-${m}-${i}"
      onmousedown="selectFromSearch('${m}','${esc(p.barcode||'')}','${esc(p.name)}')"
      ontouchstart="selectFromSearch('${m}','${esc(p.barcode||'')}','${esc(p.name)}')">
      <div class="sd-name">${escHtml(p.name)}</div>
      <div class="sd-bc">${p.barcode||'바코드없음'}</div>
    </div>`).join('');
  drop.dataset.count = scored.length;
  drop.dataset.items = JSON.stringify(scored);
  drop.classList.add('open');
}

function onSearchKey(m, e) {
  const drop = document.getElementById('sdrop-'+m);
  if (!drop.classList.contains('open')) return;
  const count = parseInt(drop.dataset.count||0);
  let cur = searchCursor[m];
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    cur = Math.min(cur+1, count-1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    cur = Math.max(cur-1, 0);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (cur >= 0) {
      const items = JSON.parse(drop.dataset.items||'[]');
      if (items[cur]) selectFromSearch(m, items[cur].barcode||'', items[cur].name);
    }
    return;
  } else if (e.key === 'Escape') {
    drop.classList.remove('open'); return;
  } else return;
  searchCursor[m] = cur;
  // 하이라이트
  for (let i=0; i<count; i++) {
    const el = document.getElementById(`sdi-${m}-${i}`);
    if (el) el.style.background = i===cur ? 'var(--accent-bg)' : '';
  }
  document.getElementById(`sdi-${m}-${cur}`)?.scrollIntoView({block:'nearest'});
}

function selectFromSearch(m, barcode, name) {
  // 검색창 닫기
  document.getElementById('sdrop-'+m).classList.remove('open');
  document.getElementById('search-'+m).value = '';
  // 바코드 있으면 바코드로 스캔, 없으면 이름으로 직접 추가
  if (barcode) {
    addScan(barcode, m);
  } else {
    addScanByName(name, m);
  }
}

// 외부 클릭 시 검색 드롭다운 닫기
document.addEventListener('mousedown', function(e) {
  ['in','out'].forEach(m => {
    const drop = document.getElementById('sdrop-'+m);
    const input = document.getElementById('search-'+m);
    if (drop && input && !drop.contains(e.target) && e.target !== input) {
      drop.classList.remove('open');
    }
  });
});

// ═══════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════
function openCam(m) {
  scanMode=m;
  document.getElementById('camWrap').classList.add('open');
  document.getElementById('camManual').value='';
  const b=document.getElementById('camBadge');
  b.textContent=m==='in'?'📦 입고 스캔':'📤 출고 스캔';
  b.className='cam-mode-badge '+m;
  startQuagga();
}
function closeCam() {
  document.getElementById('camWrap').classList.remove('open');
  isScanning = false;
  if (zxingReader) {
    try { zxingReader.getTracks().forEach(t => t.stop()); } catch(e){}
    zxingReader = null;
  }
  const video = document.getElementById('scanner-video');
  if (video) { video.srcObject = null; }
  // Quagga 정리 (iOS)
  if (window._quaggaRunning) {
    try { Quagga.stop(); } catch(e) {}
    window._quaggaRunning = false;
  }
}
async function startQuagga() {
  if (isScanning) return;
  const video = document.getElementById('scanner-video');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    isScanning = true;
    zxingReader = stream;
    scanFrame(video);
  } catch(e) {
    showToast('카메라 접근 실패: ' + e.message, 'err');
    isScanning = false;
  }
}

// 크롭 캔버스 공용
const _cropCanvas = document.createElement('canvas');
const _cropCtx = _cropCanvas.getContext('2d');

function cropVideoFrame(video) {
  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) return null;
  const fw = Math.floor(vw * 0.65), fh = Math.floor(vh * 0.35);
  const fx = Math.floor((vw - fw) / 2), fy = Math.floor((vh - fh) / 2);
  _cropCanvas.width = fw; _cropCanvas.height = fh;
  _cropCtx.drawImage(video, fx, fy, fw, fh, 0, 0, fw, fh);
  return _cropCanvas;
}

function scanFrame(video) {
  if (!isScanning) return;

  if ('BarcodeDetector' in window) {
    // Android Chrome - BarcodeDetector API
    const detector = new BarcodeDetector({
      formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'upc_a', 'upc_e', 'qr_code', 'data_matrix', 'pdf417', 'aztec', 'itf', 'codabar']
    });
    function detect() {
      if (!isScanning) return;
      if (video.readyState < 2) { requestAnimationFrame(detect); return; }
      const canvas = cropVideoFrame(video);
      if (!canvas) { requestAnimationFrame(detect); return; }
      detector.detect(canvas).then(barcodes => {
        if (barcodes.length > 0) {
          if (navigator.vibrate) navigator.vibrate(60);
          closeCam(); addScan(barcodes[0].rawValue, scanMode); return;
        }
        requestAnimationFrame(detect);
      }).catch(() => requestAnimationFrame(detect));
    }
    detect();

  } else if (window.Quagga) {
    // iOS Safari - QuaggaJS (1D) + jsQR (QR코드) 병행
    const videoEl = document.getElementById('scanner-view');

    // 1. jsQR로 QR코드 감지 (별도 루프)
    function detectQR() {
      if (!isScanning) return;
      if (video.readyState < 2) { requestAnimationFrame(detectQR); return; }
      const canvas = cropVideoFrame(video);
      if (!canvas) { requestAnimationFrame(detectQR); return; }
      const imageData = _cropCtx.getImageData(0, 0, canvas.width, canvas.height);
      const qr = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' });
      if (qr && qr.data) {
        if (navigator.vibrate) navigator.vibrate(60);
        closeCam(); addScan(qr.data, scanMode); return;
      }
      requestAnimationFrame(detectQR);
    }
    detectQR();

    // 2. QuaggaJS로 1D 바코드 감지
    Quagga.init({
      inputStream: {
        name: 'Live',
        type: 'LiveStream',
        target: videoEl,
        constraints: { facingMode: 'environment', width: 1280, height: 720 },
        area: { top: '30%', right: '15%', left: '15%', bottom: '30%' }
      },
      decoder: {
        readers: ['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader','upc_e_reader','i2of5_reader','codabar_reader']
      },
      locate: true
    }, (err) => {
      if (err) return;
      Quagga.start();
      window._quaggaRunning = true;
    });
    Quagga.onDetected((result) => {
      if (!isScanning) return;
      const code = result.codeResult.code;
      if (!code) return;
      if (navigator.vibrate) navigator.vibrate(60);
      closeCam(); addScan(code, scanMode);
    });

  } else {
    showToast('이 기기는 자동 스캔 미지원. 수동 입력 사용', 'warn');
  }
}
function manualScan(){
  const code=document.getElementById('camManual').value.trim();
  if(!code)return; closeCam(); addScan(code, scanMode);
}

// ═══════════════════════════════════════
// ADD SCAN (바코드)
// ═══════════════════════════════════════
async function addScan(rawBarcode, m) {
  m = m || scanMode;
  // 정규화
  const barcode = normalizeBarcode(rawBarcode);
  const variants = getBarcodeVariants(rawBarcode);

  // 캐시 로드가 안 됐으면 먼저 로드
  if (!cacheReady && sheetUrl) {
    showToast('⏳ 상품 목록 로딩 중...', '');
    await loadAllProducts();
  }
  


  const list = m==='in'?pendingIn:pendingOut;
  // 이미 있으면 첫 단위 +1
  const existing = list.find(x => variants.includes(x.barcode) || x.barcode === barcode);
  if (existing) {
    if (existing.unitRows[existing.selectedUnit]) existing.unitRows[existing.selectedUnit].qty++;
    renderPending(m);
    showToast(`${existing.name||barcode} +1`,'ok');
    return;
  }

  const le=document.getElementById('lookup-'+m);
  le.classList.add('show');
  document.getElementById('lookup-'+m+'-text').textContent=`조회 중...`;
  goMode(m);

  let unitRows=[], memo='', name='', source='new', foundBarcode=barcode;

  // 시트에서 여러 바코드 형식으로 검색
  // 캐시에서 먼저 찾기
  for (const v of variants) {
    // 메인 바코드 또는 추가 바코드(G열) 검색
    const cachedAll = allSheetProducts.filter(p => 
      p.barcode === v || (p.extraBarcodes && p.extraBarcodes.includes(v))
    );
    if (cachedAll.length > 0 && cachedAll[0].name) {
      name = cachedAll[0].name;
      source = 'sheet';
      foundBarcode = v;
      unitRows = cachedAll.map(cached => {
        const u = parseUnit(cached.unitLabel || '묶음');
        return {
          rowIndex: cached.rowIndex || null,
          unitLabel: cached.unitLabel || '묶음',
          display: u.display,
          qty: 0,
          unitQty: u.qty,
          stockBox: cached.stockBox || 0,
          stockUnit: cached.stockUnit || 0
        };
      });
      memo = cachedAll[0].memo || '';
      break;
    }
  }

  // 캐시에 없으면 시트에서 직접 조회 (정규화된 바코드 우선)
  if (!name && sheetUrl) {
    // 정규화된 바코드를 앞에 추가
    const searchVariants = [...new Set([barcode, ...variants])];
    for (const v of searchVariants) {
      try {
        const data=await jsonpFetch(`${sheetUrl}?action=getProduct&barcode=${encodeURIComponent(v)}`);
        if (data && data.success && data.rows && data.rows.length) {
          name = data.rows[0].name;
          memo = data.rows[0].memo || '';
          source = 'sheet';
          foundBarcode = v;
          unitRows = data.rows.map((r,i)=>{
            const u = parseUnit(r.unitLabel);
            return {
              rowIndex: r.rowIndex,
              unitLabel: r.unitLabel,
              display: u.display,
              qty: i===0?1:0,
              unitQty: u.qty,
              stockBox: r.stockBox||0,
              stockUnit: r.stockUnit||0
            };
          });
          // 캐시 저장
          sheetCache[v] = {name, unitRows, memo};
          break;
        }
      } catch(e){}
    }
  }

  // 백데이터에서 이름 찾기
  if (!name) {
    for (const v of variants) {
      if (backData[v]) { name=backData[v].name; source='local-file'; break; }
    }
  }

  if (!unitRows.length) {
    unitRows = [{rowIndex:null, unitLabel:'묶음', display:'묶음', qty:1, unitQty:1, stockBox:0, stockUnit:0}];
  }

  const item = {
    id: Date.now()+Math.random(),
    barcode: foundBarcode,
    name, memo, source,
    isNew: !name,
    unitRows,
    selectedUnit: 0,
    extraUnits: 0,
    stockUnit: unitRows[0]?.stockUnit||0,
    showAddPanel: false,
    showLinkPanel: false
  };

  list.unshift(item);
  le.classList.remove('show');
  renderPending(m);

  const srcMsg = source==='sheet'?'📊 시트에서 찾음':source==='local-file'?'📁 백데이터에서 찾음':'🆕 신규 상품';
  showToast(srcMsg, source==='new'?'warn':'ok');
}

// 검색으로 이름만 있을 때 추가
async function addScanByName(name, m) {
  const list = m==='in'?pendingIn:pendingOut;
  const existing = list.find(x=>x.name===name);
  if (existing) {
    if (existing.unitRows[existing.selectedUnit]) existing.unitRows[existing.selectedUnit].qty++;
    renderPending(m); showToast(`${name} +1`,'ok'); return;
  }
  // 시트에서 이름으로 찾기
  const sheetP = allSheetProducts.find(p=>p.name===name);
  if (sheetP && sheetP.barcode) {
    await addScan(sheetP.barcode, m); return;
  }
  // 이름만으로 직접 추가
  const item = {
    id: Date.now()+Math.random(),
    barcode: '',
    name, memo: '', source: 'search',
    isNew: false,
    unitRows: [{rowIndex:null,unitLabel:'묶음',display:'묶음',qty:1,unitQty:1,stockBox:0,stockUnit:0}],
    selectedUnit:0, extraUnits:0, stockUnit:0, showAddPanel:false
  };
  list.unshift(item);
  renderPending(m);
  showToast(`${name} 추가됨`,'ok');
}

// ═══════════════════════════════════════
// UNIT PARSER
// ═══════════════════════════════════════
function parseUnit(raw) {
  if (!raw) return {display:'묶음', qty:1};
  const s = String(raw).trim();
  const numMatch = s.match(/(\d+)/);
  const qty = numMatch ? parseInt(numMatch[1]) : 1;
  let type = '묶음';
  if (s.includes('통')) type='통';
  else if (s.includes('박스')) type='박스';
  else if (s.includes('짝')) type='짝';
  else if (s.includes('포')) type='포';
  const display = qty > 1 ? `${type}(${qty}개)` : type;
  return {display, qty, raw:s};
}

// ═══════════════════════════════════════
// RENDER PENDING
// ═══════════════════════════════════════
function renderPending(m) {
  const list=m==='in'?pendingIn:pendingOut;
  const container=document.getElementById(m+'-list');
  const emptyEl=document.getElementById(m+'-empty');
  const headerEl=document.getElementById(m+'-pending-header');
  const countEl=document.getElementById(m+'-count');
  const cbEl=document.getElementById('cb-'+m);

  if (!list.length) {
    container.innerHTML=''; emptyEl.style.display='block';
    headerEl.style.display='none'; cbEl.classList.remove('show'); return;
  }
  emptyEl.style.display='none'; headerEl.style.display='flex';
  countEl.textContent=list.length+'개 품목';
  cbEl.classList.add('show');
  document.getElementById('cb-'+m+'-summary').innerHTML=`<strong>${list.length}개 품목</strong> 처리 예정`;

  container.innerHTML = list.map(item=>{
    const selU = item.unitRows[item.selectedUnit];
    const isOut = m==='out';
    const srcLabel = item.source==='sheet'?'시트':item.source==='local-file'?'백데이터':item.source==='search'?'검색':'신규';
    const srcClass = item.source==='sheet'||item.source==='local-file'||item.source==='search'?'local':'new';

    // 각 단위 행으로 표시 (탭 없이)
    const allUnitsHtml = item.unitRows.map((u,ui)=>{
      const sw = isOut && u.stockBox < u.qty;
      const mid = String(item.id);
      return `
      <div style="display:flex;align-items:center;padding:8px 12px;background:var(--surface2);border-radius:10px;margin-bottom:6px;gap:8px">
        <div style="width:90px;flex-shrink:0">
          <div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(u.unitLabel||u.display)}</div>
          <div style="font-size:11px;color:${sw?'var(--red)':'var(--text3)'}">재고 ${u.stockBox}개</div>
        </div>
        <div style="display:flex;align-items:center;flex-shrink:0;margin-left:auto">
          <button class="qs-btn" onclick="adjUnitQtyIdx('${m}','${mid}',${ui},-1)">−</button>
          <input class="qs-val" id="uqty-${mid}-${ui}" type="number" value="${u.qty}" min="0" onchange="setUnitQtyIdx('${m}','${mid}',${ui},this.value)">
          <button class="qs-btn" onclick="adjUnitQtyIdx('${m}','${mid}',${ui},1)">+</button>
        </div>
      </div>`;
    }).join('');

    const addPanelHtml = `
      <div class="unit-add-panel ${item.showAddPanel?'open':''}" id="uap-${item.id}">
        <div class="uap-title">+ 단위 추가</div>
        <div class="uap-hint">예: 30개 1묶음, 1통, 100병 1짝</div>
        <div class="uap-row">
          <input class="uap-input" id="uap-input-${item.id}" placeholder="예: 30개 1묶음">
        </div>
        <button class="uap-save" onclick="addUnit('${m}','${item.id}')">추가 (시트에 새 행 삽입)</button>
      </div>`;

    const unitWarn = isOut && item.stockUnit < item.extraUnits;
    const extraHtml = `
      <div style="display:flex;align-items:center;padding:8px 12px;border-top:1px dashed var(--border);gap:8px">
        <div style="width:90px;flex-shrink:0">
          <div style="font-size:12px;color:var(--text2);white-space:nowrap">🔹 낱개</div>
          <div style="font-size:11px;color:${unitWarn?'var(--red)':'var(--text3)'}">재고 ${item.stockUnit}개</div>
        </div>
        <div style="display:flex;align-items:center;flex-shrink:0;margin-left:auto">
          <button class="qs-btn" onclick="adjExtra('${m}','${item.id}',-1)">−</button>
          <input class="qs-val" id="extra-${item.id}" type="number" value="${item.extraUnits}" min="0" onchange="setExtra('${m}','${item.id}',this.value)">
          <button class="qs-btn" onclick="adjExtra('${m}','${item.id}',1)">+</button>
        </div>
      </div>`;
    const unitQtyHtml = allUnitsHtml;

    return `
    <div class="pending-item ${m}-item" id="pi-${item.id}">
      <div class="pi-top">
        <div class="pi-icon">${item.isNew?'🆕':(m==='in'?'📦':'📤')}</div>
        <div class="pi-info">
          ${item.isNew
            ? `<div style="position:relative">
                <input class="pi-name-input" id="name-${item.id}" placeholder="상품명 입력 (기존 상품 자동검색)" value="${escHtml(item.name)}"
                  oninput="onNewItemSearch('${m}','${item.id}',this.value)"
                  onchange="updateName('${m}','${item.id}',this.value)"
                  autocomplete="off">
                <div id="new-drop-${item.id}" style="display:none;position:absolute;left:0;right:0;top:100%;background:white;border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:100;max-height:180px;overflow-y:auto">
                  <div style="padding:6px 10px;font-size:10px;color:var(--text3);border-bottom:1px solid var(--border)">기존 상품 선택 시 바코드 연결 / 미선택 시 신규 추가</div>
                </div>
              </div>`
            : `<div class="pi-name">${escHtml(item.name)}</div>`}
          <div class="pi-barcode">${escHtml(item.barcode)||'바코드없음'}</div>

      </div>
      <div class="pi-memo">
        <span class="pi-memo-label">📌 참고</span>
        <input class="pi-memo-input" id="memo-${item.id}" value="${escHtml(item.memo)}" placeholder="참고사항...">
        <button class="pi-memo-save" onclick="saveMemo('${m}','${item.id}')">저장</button>
      </div>
      <div class="pi-units">
        <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
          <button class="unit-add-btn" onclick="toggleAddPanel('${m}','${item.id}')">+ 단위추가</button>
        </div>
        ${addPanelHtml}
        ${unitQtyHtml}
      </div>
      ${extraHtml}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// UNIT ACTIONS
// ═══════════════════════════════════════
function selectUnit(m,id,idx){
  const l=m==='in'?pendingIn:pendingOut;
  const i=l.find(x=>String(x.id)===String(id));
  if(i){i.selectedUnit=idx; renderPending(m);}
}
function adjUnitQtyIdx(m,id,ui,delta){
  const l=m==='in'?pendingIn:pendingOut;
  const item=l.find(x=>String(x.id)===String(id)); if(!item)return;
  const u=item.unitRows[ui]; if(!u)return;
  u.qty=Math.max(0,u.qty+delta);
  const el=document.getElementById('uqty-'+id+'-'+ui); if(el)el.value=u.qty;
  updateConfirmBar(m);
}
function setUnitQtyIdx(m,id,ui,val){
  const l=m==='in'?pendingIn:pendingOut;
  const item=l.find(x=>String(x.id)===String(id)); if(!item)return;
  const u=item.unitRows[ui]; if(!u)return;
  u.qty=Math.max(0,parseInt(val)||0);
  updateConfirmBar(m);
}
function adjUnitQty(m,id,delta){adjUnitQtyIdx(m,id,0,delta);}
function setUnitQty(m,id,val){setUnitQtyIdx(m,id,0,val);}
function adjExtra(m,id,delta){
  const l=m==='in'?pendingIn:pendingOut;
  const item=l.find(x=>String(x.id)===String(id)); if(!item)return;
  item.extraUnits=Math.max(0,(item.extraUnits||0)+delta);
  const el=document.getElementById('extra-'+id); if(el)el.value=item.extraUnits;
  updateConfirmBar(m);
}
function setExtra(m,id,val){
  const l=m==='in'?pendingIn:pendingOut;
  const item=l.find(x=>String(x.id)===String(id)); if(!item)return;
  item.extraUnits=Math.max(0,parseInt(val)||0);
  updateConfirmBar(m);
}
function updateConfirmBar(m){
  const list=m==='in'?pendingIn:pendingOut;
  document.getElementById('cb-'+m+'-summary').innerHTML=`<strong>${list.length}개 품목</strong> 처리 예정`;
}
function toggleAddPanel(m,id){
  const l=m==='in'?pendingIn:pendingOut;
  const item=l.find(x=>String(x.id)===String(id)); if(!item)return;
  item.showAddPanel=!item.showAddPanel;
  document.getElementById('uap-'+id)?.classList.toggle('open',item.showAddPanel);
}
async function addUnit(m,id){
  const l=m==='in'?pendingIn:pendingOut;
  const item=l.find(x=>String(x.id)===String(id)); if(!item)return;
  const input=document.getElementById('uap-input-'+id);
  const val=input.value.trim(); if(!val){showToast('단위를 입력하세요','err');return;}
  const u=parseUnit(val);
  const newRow={rowIndex:null,unitLabel:val,display:u.display,qty:0,unitQty:u.qty,stockBox:0,stockUnit:0};
  if(sheetUrl&&item.unitRows[0]?.rowIndex){
    try{
      const res=await fetch(sheetUrl,{method:'POST',headers:{'Content-Type':'text/plain'},
        redirect:'follow',
        body:JSON.stringify({action:'addUnitRow',barcode:item.barcode,name:item.name,unitLabel:val,afterRowIndex:item.unitRows[item.unitRows.length-1].rowIndex})});
      const data=await res.json();
      if(data.success){newRow.rowIndex=data.rowIndex;}
    }catch(e){}
  }
  item.unitRows.push(newRow);
  item.selectedUnit=item.unitRows.length-1;
  item.showAddPanel=false; input.value='';
  renderPending(m); showToast(`"${u.display}" 단위 추가됨`,'ok');
}
async function saveMemo(m,id){
  const l=m==='in'?pendingIn:pendingOut;
  const item=l.find(x=>String(x.id)===String(id)); if(!item)return;
  const memo=document.getElementById('memo-'+id).value;
  item.memo=memo;
  if(sheetUrl&&item.unitRows[0]?.rowIndex){
    try{
      await fetch(sheetUrl,{method:'POST',headers:{'Content-Type':'text/plain'},
        redirect:'follow',
        body:JSON.stringify({action:'updateMemo',rowIndex:item.unitRows[0].rowIndex,memo})});
      showToast('📌 참고사항 저장됨','ok');
    }catch(e){showToast('저장 실패','err');}
  } else {
    showToast('📌 참고사항 저장됨','ok');
  }
}
// 신규 상품 입력 시 기존 상품 드롭다운 검색
function onNewItemSearch(m, id, query) {
  const l = m==='in'?pendingIn:pendingOut;
  const item = l.find(x=>String(x.id)===String(id));
  if (!item) return;
  item.name = query; // 이름 실시간 업데이트

  const drop = document.getElementById('new-drop-' + id);
  if (!drop) return;

  if (!query.trim()) { drop.style.display='none'; return; }

  const q = query.toLowerCase();
  const results = allSheetProducts.filter(p =>
    p.name && p.name.toLowerCase().includes(q)
  ).slice(0, 8);

  const header = '<div style="padding:6px 10px;font-size:10px;color:var(--text3);border-bottom:1px solid var(--border)">기존 상품 선택 시 바코드 연결 / 미선택 시 신규 추가</div>';

  if (!results.length) {
    drop.innerHTML = header + '<div style="padding:8px 10px;font-size:12px;color:var(--text3)">검색 결과 없음 — 새 상품으로 추가됩니다</div>';
    drop.style.display = 'block';
    return;
  }

  drop.innerHTML = header + results.map(p =>
    `<div onmousedown="linkToExisting('${m}','${id}','${esc(p.barcode||'')}','${esc(p.name)}')"
      style="padding:8px 12px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)"
      onmouseover="this.style.background='var(--accent-bg)'" onmouseout="this.style.background=''">
      <span style="font-weight:600">${escHtml(p.name)}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${escHtml(p.barcode||'')}</span>
    </div>`
  ).join('');
  drop.style.display = 'block';
}

// 기존 상품 선택 → G열에 바코드 연결 + 기존 상품 데이터로 교체
async function linkToExisting(m, id, existingBarcode, existingName) {
  const l = m==='in'?pendingIn:pendingOut;
  const item = l.find(x=>String(x.id)===String(id));
  if (!item) return;

  const newBarcode = item.barcode; // 스캔한 새 바코드

  // 드롭다운 닫기
  const drop = document.getElementById('new-drop-' + id);
  if (drop) drop.style.display = 'none';

  showToast('상품 정보 불러오는 중...', '');

  // 기존 상품 데이터 시트에서 조회
  let unitRows = [];
  let stockUnit = 0;
  try {
    const res = await fetch(`${DEFAULT_URL}?action=getProduct&barcode=${encodeURIComponent(existingBarcode)}`);
    const data = await res.json();
    if (data.success && data.rows?.length) {
      unitRows = data.rows.map(r => ({
        rowIndex: r.rowIndex,
        unitLabel: r.unitLabel,
        display: parseUnit(r.unitLabel).display,
        qty: 0,
        unitQty: parseUnit(r.unitLabel).qty,
        stockBox: r.stockBox || 0,
        stockUnit: r.stockUnit || 0
      }));
      stockUnit = data.rows[0].stockUnit || 0;
    }
  } catch(e) {
    // 로컬 캐시에서 찾기
    const cached = allSheetProducts.filter(p => p.barcode === existingBarcode);
    if (cached.length) {
      unitRows = cached.map(c => ({
        rowIndex: null,
        unitLabel: c.unitLabel || '',
        display: parseUnit(c.unitLabel).display,
        qty: 0,
        unitQty: parseUnit(c.unitLabel).qty,
        stockBox: c.stockBox || 0,
        stockUnit: c.stockUnit || 0
      }));
      stockUnit = cached[0].stockUnit || 0;
    }
  }

  // 아이템을 기존 상품으로 완전히 전환
  item.name = existingName;
  item.barcode = existingBarcode;
  item.source = 'sheet';
  item.isNew = false;
  item.showLinkPanel = false;
  item.unitRows = unitRows;
  item.stockUnit = stockUnit;
  item.showAddPanel = unitRows.length === 0;

  // G열에 새 바코드 추가 (백그라운드)
  if (newBarcode && newBarcode !== existingBarcode) {
    fetch(DEFAULT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({ action: 'addExtraBarcode', existingBarcode, newBarcode })
    }).then(r=>r.json()).then(data => {
      if (data.success) {
        const cached = allSheetProducts.find(p => p.barcode === existingBarcode);
        if (cached) {
          if (!cached.extraBarcodes) cached.extraBarcodes = [];
          if (!cached.extraBarcodes.includes(newBarcode)) cached.extraBarcodes.push(newBarcode);
        }
        showToast(`✅ "${existingName}" 바코드 연결됨`, 'ok');
      } else {
        showToast('G열 연결 실패: ' + (data.message||''), 'err');
      }
    }).catch(() => showToast('연결 중 오류', 'err'));
  } else {
    showToast(`✅ "${existingName}" 선택됨`, 'ok');
  }

  renderPending(m);
}

function updateName(m,id,val){
  const l=m==='in'?pendingIn:pendingOut;
  const i=l.find(x=>String(x.id)===String(id)); if(i)i.name=val;
}
function removeItem(m,id){
  if(m==='in')pendingIn=pendingIn.filter(x=>String(x.id)!==String(id));
  else pendingOut=pendingOut.filter(x=>String(x.id)!==String(id));
  renderPending(m);
}
function clearAll(m){
  if(!confirm('목록을 전체 삭제할까요?'))return;
  if(m==='in')pendingIn=[];else pendingOut=[];
  renderPending(m);
}

// ═══════════════════════════════════════
// COMMIT ALL
// ═══════════════════════════════════════
async function commitAll(m) {
  const list=m==='in'?pendingIn:pendingOut;
  if(!list.length)return;
  for(const item of list){
    if(item.isNew&&!item.name.trim()){showToast('상품명을 입력하세요','err');return;}
    if(m==='out'){
      for(const u of item.unitRows){
        if(u.qty>0&&u.stockBox<u.qty){showToast(`⚠ ${item.name}: ${u.display} 재고 부족`,'err');return;}
      }
      if((item.extraUnits||0)>0&&item.stockUnit<item.extraUnits){showToast(`⚠ ${item.name}: 낱개 재고 부족`,'err');return;}
    }
  }
  const btn=document.getElementById('cb-'+m+'-btn');
  const spin=document.getElementById('spin-'+m);
  const txt=document.getElementById('cb-'+m+'-txt');
  btn.disabled=true; spin.style.display='block'; txt.textContent='저장 중...';
  const now=new Date(); const records=[];
  for(const item of list){
    const name=item.name.trim();
    for(const u of item.unitRows){
      if(u.qty===0)continue;
      const newStockBox=m==='in'?u.stockBox+u.qty:u.stockBox-u.qty;
      records.push({rowIndex:u.rowIndex,barcode:item.barcode,name,unitLabel:u.unitLabel,type:m,
        qty:u.qty,unitQty:u.unitQty,prevStockBox:u.stockBox,newStockBox,
        prevStockUnit:item.stockUnit||0,newStockUnit:item.stockUnit||0,time:now.toISOString()});
    }
    if((item.extraUnits||0)>0){
      const newStockUnit=m==='in'?(item.stockUnit||0)+item.extraUnits:(item.stockUnit||0)-item.extraUnits;
      records.push({rowIndex:item.unitRows[0]?.rowIndex,barcode:item.barcode,name,unitLabel:'낱개',type:m,
        qty:item.extraUnits,unitQty:1,prevStockBox:0,newStockBox:0,
        prevStockUnit:item.stockUnit||0,newStockUnit,isUnit:true,time:now.toISOString()});
    }
    histLog.unshift({barcode:item.barcode,name,type:m,
      unitRows:item.unitRows.filter(u=>u.qty>0).map(u=>({display:u.display,qty:u.qty})),
      extraUnits:item.extraUnits||0,time:now.toISOString()});
    if(histLog.length>300)histLog.pop();
  }
  localStorage.setItem('phHistory',JSON.stringify(histLog));
  let sheetOk=false;
  if(sheetUrl){
    try{
      const res=await fetch(sheetUrl,{method:'POST',headers:{'Content-Type':'text/plain'},
        redirect:'follow',
        body:JSON.stringify({action:'batchUpdate',records})});
      const data=await res.json(); sheetOk=data.success;
      // 캐시 초기화 (재고 변경됨)
      sheetCache={};
    }catch(e){}
  }
  btn.disabled=false; spin.style.display='none';
  txt.textContent=m==='in'?'✅ 입고 전체 확정':'✅ 출고 전체 확정';
  const cleared=[...list];
  if(m==='in')pendingIn=[];else pendingOut=[];
  renderPending(m);
  showToast(`${m==='in'?'📦입고':'📤출고'} ${cleared.length}개 품목 완료${sheetUrl?(sheetOk?' · 시트반영':' · 로컬저장'):''}`, 'ok');
}

// ═══════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════
function renderHistory() {
  const today=new Date().toDateString();
  const logs=histLog.filter(r=>new Date(r.time).toDateString()===today);
  const el=document.getElementById('hist-list');
  document.getElementById('hist-count').textContent=logs.length?`(${logs.length}건)`:'';
  if(!logs.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">오늘의 이력이 없습니다</div></div>`;return;}
  el.innerHTML=logs.map(r=>{
    const t=new Date(r.time).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    const sign=r.type==='in'?'+':'-';
    const unitStr=(r.unitRows||[]).map(u=>`${sign}${u.qty}${u.display}`).join(', ');
    const extraStr=r.extraUnits>0?` ${sign}${r.extraUnits}낱개`:'';
    return `<div class="hist-item"><div class="hi-badge ${r.type}">${r.type==='in'?'📦':'📤'}</div>
      <div class="hi-body"><div class="hi-name">${escHtml(r.name)}</div><div class="hi-meta">${t}</div></div>
      <div class="hi-qty ${r.type}">${unitStr}${extraStr}</div></div>`;
  }).join('');
}

// ═══════════════════════════════════════
// BACK DATA
// ═══════════════════════════════════════
function loadBackData(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const text=ev.target.result;
    const lines=text.split(/\r?\n/);
    if(lines.length<2)return;
    const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,'').toLowerCase());
    const bcIdx=headers.findIndex(h=>h.includes('바코드')||h.includes('barcode')||h.includes('대표코드'));
    const nameIdx=headers.findIndex(h=>h.includes('상품명')||h.includes('품명')||h.includes('name'));
    if(bcIdx<0||nameIdx<0){showToast('바코드/상품명 컬럼을 찾지 못했어요','err');return;}
    let count=0;
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',').map(c=>c.trim().replace(/"/g,''));
      const bc=cols[bcIdx],name=cols[nameIdx];
      if(bc&&name){backData[bc]={name};count++;}
    }
    localStorage.setItem('phBackData',JSON.stringify(backData));
    document.getElementById('fileUploadArea').classList.add('has-file');
    document.getElementById('fileStatus').textContent=`✅ ${count}개 상품 로드됨`;
    showToast(`📁 ${count}개 로드됨`,'ok');
  };
  reader.readAsText(file,'UTF-8');
}
function updateFileStatus(){
  const count=Object.keys(backData).length;
  if(count>0){
    document.getElementById('fileUploadArea').classList.add('has-file');
    document.getElementById('fileStatus').textContent=`✅ ${count}개 상품 로드됨`;
  }
}

// ═══════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════
function saveUrl(){
  const url=document.getElementById('urlInput').value.trim();
  sheetUrl=url; localStorage.setItem('phSheetUrl',url);
  updateSheetStatus();
  loadAllProducts();
  showToast(url?'✅ 구글 시트 연결됨':'연결 해제됨',url?'ok':'');
}
function updateSheetStatus(){
  document.getElementById('sheetDot').className='dot'+(sheetUrl?' on':'');
  document.getElementById('sheetTxt').textContent=sheetUrl?'시트 연결됨':'시트 연결';
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
let _tt;
function showToast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(type?' '+type:'');
  clearTimeout(_tt); _tt=setTimeout(()=>{el.className='toast'},3200);
}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function esc(s){return String(s||'').replace(/'/g,"\\'").replace(/"/g,'\\"')}

init();
</script>
