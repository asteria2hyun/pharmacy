<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>약국 재고관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #f7f9fc;
  --border: #e3e8ef;
  --text: #1a202c;
  --text2: #5a6a7e;
  --text3: #9aacbe;
  --in: #2563eb;
  --in-bg: #eff6ff;
  --in-border: #bfdbfe;
  --out: #ea580c;
  --out-bg: #fff7ed;
  --out-border: #fed7aa;
  --green: #16a34a;
  --green-bg: #f0fdf4;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --yellow: #d97706;
  --yellow-bg: #fffbeb;
  --accent: #7c3aed;
  --accent-bg: #f5f3ff;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --radius: 14px;
  --radius-sm: 9px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:var(--sans); background:var(--bg); color:var(--text); min-height:100vh; max-width:480px; margin:0 auto; padding-bottom:90px; }

/* ── Header ── */
.header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 18px 0; position:sticky; top:0; z-index:100; }
.header-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.logo { display:flex; align-items:center; gap:9px; }
.logo-mark { width:34px; height:34px; background:var(--accent); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; }
.logo-name { font-size:16px; font-weight:700; letter-spacing:-.3px; }
.logo-sub { font-size:10px; color:var(--text3); }
.sheet-pill { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text2); background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:5px 10px; cursor:pointer; }
.dot { width:7px; height:7px; border-radius:50%; background:var(--text3); transition:background .3s; }
.dot.on { background:var(--green); }

/* mode tabs */
.tabs { display:flex; gap:0; }
.tab { flex:1; padding:10px 0; font-size:13px; font-weight:500; font-family:var(--sans); border:none; background:transparent; color:var(--text3); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; }
.tab.active-in  { color:var(--in);  border-color:var(--in); }
.tab.active-out { color:var(--out); border-color:var(--out); }
.tab.active-hist{ color:var(--accent); border-color:var(--accent); }
.tab.active-cfg { color:var(--text2); border-color:var(--text2); }

/* ── Content ── */
.content { padding:16px 16px 0; }
.sec-label { font-size:10px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--text3); margin-bottom:8px; }

/* ── Scan Button ── */
.scan-btn { width:100%; padding:18px; background:var(--surface); border:2px dashed var(--border); border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; transition:all .18s; margin-bottom:14px; }
.scan-btn:active { transform:scale(.98); }
.scan-btn.in  { border-color:var(--in);  background:var(--in-bg); }
.scan-btn.out { border-color:var(--out); background:var(--out-bg); }
.scan-icon { font-size:32px; }
.scan-text { font-size:14px; font-weight:600; }
.scan-sub  { font-size:11px; color:var(--text2); }

/* ── Pending List ── */
.pending-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.pending-count { font-size:12px; font-weight:600; }
.pending-count.in  { color:var(--in); }
.pending-count.out { color:var(--out); }
.clear-all-btn { font-size:11px; color:var(--red); background:none; border:none; cursor:pointer; padding:4px 0; }

.pending-list { display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }

.pending-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:all .2s; }
.pending-item.in-item  { border-left:3px solid var(--in); }
.pending-item.out-item { border-left:3px solid var(--out); }

.pi-top { display:flex; align-items:center; padding:12px 12px 10px; gap:10px; }
.pi-icon { font-size:20px; flex-shrink:0; }
.pi-info { flex:1; min-width:0; }
.pi-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pi-name-input { font-size:13px; font-weight:600; border:none; border-bottom:2px solid var(--in); outline:none; font-family:var(--sans); width:100%; background:transparent; padding:2px 0; }
.pi-barcode { font-family:var(--mono); font-size:10px; color:var(--text3); margin-top:1px; }
.pi-actions { display:flex; gap:6px; flex-shrink:0; }
.pi-edit-btn, .pi-del-btn { width:30px; height:30px; border-radius:7px; border:1px solid var(--border); background:var(--surface2); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.pi-del-btn { color:var(--red); }

.pi-body { padding:0 12px 12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }

/* qty unit chip */
.qty-unit { display:flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:6px 10px; }
.qty-unit-label { font-size:11px; color:var(--text2); white-space:nowrap; }
.qty-stepper { display:flex; align-items:center; gap:0; }
.qs-btn { width:28px; height:28px; border:none; background:transparent; font-size:18px; cursor:pointer; color:var(--text2); display:flex; align-items:center; justify-content:center; border-radius:6px; }
.qs-btn:active { background:var(--border); }
.qs-val { font-family:var(--mono); font-size:15px; font-weight:600; min-width:28px; text-align:center; border:none; background:transparent; outline:none; color:var(--text); }

.pi-total { margin-left:auto; font-family:var(--mono); font-size:12px; color:var(--text2); white-space:nowrap; }
.pi-total strong { font-size:15px; color:var(--text); }

/* edit panel */
.pi-edit-panel { border-top:1px solid var(--border); padding:10px 12px; background:var(--surface2); display:none; }
.pi-edit-panel.open { display:block; }
.ep-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.ep-label { font-size:11px; color:var(--text2); width:68px; flex-shrink:0; }
.ep-input { flex:1; padding:7px 10px; border:1px solid var(--border); border-radius:7px; font-size:13px; font-family:var(--mono); background:var(--surface); outline:none; color:var(--text); }
.ep-input:focus { border-color:var(--accent); }
.ep-save { width:100%; padding:8px; background:var(--accent); color:white; border:none; border-radius:7px; font-family:var(--sans); font-size:12px; font-weight:600; cursor:pointer; }

/* confirm bar */
.confirm-bar { position:sticky; bottom:82px; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); padding:12px 16px; display:none; max-width:480px; margin:0 auto; z-index:90; }
.confirm-bar.show { display:block; }
.cb-summary { font-size:12px; color:var(--text2); margin-bottom:10px; }
.cb-summary strong { color:var(--text); }
.cb-btn { width:100%; padding:14px; border:none; border-radius:var(--radius); font-family:var(--sans); font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all .18s; }
.cb-btn:active { transform:scale(.98); }
.cb-btn.in  { background:var(--in);  color:white; }
.cb-btn.out { background:var(--out); color:white; }
.cb-btn:disabled { opacity:.45; }
.spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,.35); border-top-color:white; border-radius:50%; animation:spin .6s linear infinite; display:none; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Camera ── */
.camera-wrap { display:none; position:fixed; inset:0; background:#000; z-index:200; flex-direction:column; }
.camera-wrap.open { display:flex; }
#scanner-view { flex:1; position:relative; overflow:hidden; }
#scanner-view video { width:100%!important; height:100%!important; object-fit:cover!important; }
#scanner-view canvas { display:none!important; }
.scan-ui { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; }
.scan-frame { width:270px; height:150px; border:2px solid rgba(255,255,255,.7); border-radius:12px; position:relative; box-shadow:0 0 0 9999px rgba(0,0,0,.55); }
.scan-line { position:absolute; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#2563eb,transparent); animation:sl 1.8s linear infinite; top:0; }
@keyframes sl { 0%{top:0} 100%{top:100%} }
.corner { position:absolute; width:18px; height:18px; border-color:#2563eb; border-style:solid; border-width:0; }
.corner.tl { top:-2px; left:-2px; border-top-width:3px; border-left-width:3px; border-radius:4px 0 0 0; }
.corner.tr { top:-2px; right:-2px; border-top-width:3px; border-right-width:3px; border-radius:0 4px 0 0; }
.corner.bl { bottom:-2px; left:-2px; border-bottom-width:3px; border-left-width:3px; border-radius:0 0 0 4px; }
.corner.br { bottom:-2px; right:-2px; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 4px 0; }
.scan-hint { color:rgba(255,255,255,.85); font-size:13px; margin-top:22px; }
.cam-close { position:absolute; top:20px; right:20px; width:40px; height:40px; background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.2); border-radius:50%; color:white; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; pointer-events:all; }
.cam-mode-badge { position:absolute; top:20px; left:20px; background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.2); border-radius:20px; color:white; font-size:12px; font-weight:600; padding:6px 14px; pointer-events:all; }
.cam-mode-badge.in  { border-color:rgba(37,99,235,.6); color:#93c5fd; }
.cam-mode-badge.out { border-color:rgba(234,88,12,.6); color:#fed7aa; }
.cam-bottom { background:rgba(0,0,0,.8); padding:14px 16px; display:flex; gap:10px; pointer-events:all; }
.cam-input { flex:1; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.2); border-radius:8px; color:white; padding:10px 14px; font-size:14px; font-family:var(--mono); }
.cam-input::placeholder { color:rgba(255,255,255,.35); }
.cam-ok { background:var(--in); border:none; border-radius:8px; color:white; padding:10px 18px; font-size:13px; font-weight:700; cursor:pointer; }

/* ── History ── */
.hist-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; display:flex; align-items:flex-start; gap:10px; margin-bottom:7px; }
.hi-badge { width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; margin-top:1px; }
.hi-badge.in  { background:var(--in-bg); }
.hi-badge.out { background:var(--out-bg); }
.hi-body { flex:1; min-width:0; }
.hi-name { font-size:13px; font-weight:600; }
.hi-meta { font-size:11px; color:var(--text3); margin-top:2px; }
.hi-qty { font-family:var(--mono); font-size:15px; font-weight:700; flex-shrink:0; }
.hi-qty.in  { color:var(--in); }
.hi-qty.out { color:var(--out); }

/* ── Product Register (Settings) ── */
.prod-search-row { display:flex; gap:8px; margin-bottom:12px; }
.prod-search { flex:1; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:13px; font-family:var(--sans); background:var(--surface); outline:none; color:var(--text); }
.prod-search:focus { border-color:var(--accent); }
.add-prod-btn { padding:10px 14px; background:var(--accent); color:white; border:none; border-radius:var(--radius-sm); font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
.prod-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:8px; }
.prod-card-header { display:flex; align-items:center; padding:12px 14px; gap:10px; cursor:pointer; }
.prod-card-name { font-size:13px; font-weight:600; flex:1; }
.prod-card-bc { font-family:var(--mono); font-size:10px; color:var(--text3); }
.prod-card-arrow { font-size:12px; color:var(--text3); transition:transform .2s; }
.prod-card.expanded .prod-card-arrow { transform:rotate(180deg); }
.prod-card-body { border-top:1px solid var(--border); padding:12px 14px; display:none; }
.prod-card.expanded .prod-card-body { display:block; }
.pf-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.pf-label { font-size:11px; color:var(--text2); width:72px; flex-shrink:0; }
.pf-input { flex:1; padding:8px 10px; border:1px solid var(--border); border-radius:7px; font-size:13px; font-family:var(--mono); background:var(--surface2); outline:none; color:var(--text); }
.pf-input:focus { border-color:var(--accent); }
.pf-row-btns { display:flex; gap:8px; }
.pf-save { flex:1; padding:9px; background:var(--accent); color:white; border:none; border-radius:8px; font-family:var(--sans); font-size:13px; font-weight:600; cursor:pointer; }
.pf-del  { padding:9px 14px; background:var(--red-bg); color:var(--red); border:1px solid #fecaca; border-radius:8px; font-family:var(--sans); font-size:13px; cursor:pointer; }

/* sheet url setting */
.url-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.url-card-title { font-size:13px; font-weight:600; margin-bottom:10px; }
.url-input { width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:12px; font-family:var(--mono); background:var(--surface2); outline:none; color:var(--text); margin-bottom:8px; }
.url-input:focus { border-color:var(--accent); }
.url-save { width:100%; padding:10px; background:var(--accent); color:white; border:none; border-radius:var(--radius-sm); font-family:var(--sans); font-size:14px; font-weight:600; cursor:pointer; }

/* ── Empty ── */
.empty { text-align:center; padding:40px 20px; color:var(--text3); }
.empty-icon { font-size:36px; margin-bottom:10px; }
.empty-text { font-size:13px; line-height:1.6; }

/* ── Toast ── */
.toast { position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(12px); background:var(--text); color:white; padding:11px 20px; border-radius:30px; font-size:13px; opacity:0; transition:all .25s; z-index:999; pointer-events:none; white-space:nowrap; max-width:calc(100% - 32px); text-align:center; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok  { background:var(--green); }
.toast.err { background:var(--red); }
.toast.warn{ background:var(--yellow); color:#1a0000; }

/* ── Bottom Nav ── */
.nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:flex; max-width:480px; margin:0 auto; padding:6px 0 calc(6px + env(safe-area-inset-bottom)); }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; background:none; border:none; cursor:pointer; color:var(--text3); transition:color .15s; font-family:var(--sans); }
.nav-btn.a-in   { color:var(--in); }
.nav-btn.a-out  { color:var(--out); }
.nav-btn.a-hist { color:var(--accent); }
.nav-btn.a-cfg  { color:var(--text2); }
.nav-icon { font-size:21px; }
.nav-label { font-size:10px; font-weight:500; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-row">
    <div class="logo">
      <div class="logo-mark">💊</div>
      <div>
        <div class="logo-name">약국 재고관리</div>
        <div class="logo-sub">Pharmacy Inventory v2</div>
      </div>
    </div>
    <div class="sheet-pill" onclick="goMode('cfg')">
      <div class="dot" id="sheetDot"></div>
      <span id="sheetTxt">시트 연결</span>
    </div>
  </div>
  <div class="tabs">
    <button class="tab" id="tab-in"   onclick="goMode('in')">📦 입고</button>
    <button class="tab" id="tab-out"  onclick="goMode('out')">📤 출고</button>
    <button class="tab" id="tab-hist" onclick="goMode('hist')">📋 이력</button>
    <button class="tab" id="tab-cfg"  onclick="goMode('cfg')">⚙️ 설정</button>
  </div>
</div>

<!-- ══ IN MODE ══ -->
<div class="content" id="view-in" style="display:none">
  <button class="scan-btn in" onclick="openCam('in')">
    <div class="scan-icon">📷</div>
    <div class="scan-text" style="color:var(--in)">입고 바코드 스캔</div>
    <div class="scan-sub">카메라로 제품을 스캔하세요</div>
  </button>

  <div id="in-pending-header" class="pending-header" style="display:none">
    <div class="sec-label" style="margin:0">스캔 목록</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="pending-count in" id="in-count"></span>
      <button class="clear-all-btn" onclick="clearAll('in')">전체 삭제</button>
    </div>
  </div>
  <div class="pending-list" id="in-list"></div>

  <div id="in-empty" class="empty">
    <div class="empty-icon">📦</div>
    <div class="empty-text">바코드를 스캔하면<br>여기에 목록이 쌓입니다</div>
  </div>
</div>

<!-- ══ OUT MODE ══ -->
<div class="content" id="view-out" style="display:none">
  <button class="scan-btn out" onclick="openCam('out')">
    <div class="scan-icon">📷</div>
    <div class="scan-text" style="color:var(--out)">출고 바코드 스캔</div>
    <div class="scan-sub">카메라로 제품을 스캔하세요</div>
  </button>

  <div id="out-pending-header" class="pending-header" style="display:none">
    <div class="sec-label" style="margin:0">스캔 목록</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="pending-count out" id="out-count"></span>
      <button class="clear-all-btn" onclick="clearAll('out')">전체 삭제</button>
    </div>
  </div>
  <div class="pending-list" id="out-list"></div>

  <div id="out-empty" class="empty">
    <div class="empty-icon">📤</div>
    <div class="empty-text">바코드를 스캔하면<br>여기에 목록이 쌓입니다</div>
  </div>
</div>

<!-- ══ HISTORY MODE ══ -->
<div class="content" id="view-hist" style="display:none">
  <div class="sec-label">오늘의 입출고 이력 <span id="hist-count" style="color:var(--text3)"></span></div>
  <div id="hist-list"></div>
</div>

<!-- ══ SETTINGS MODE ══ -->
<div class="content" id="view-cfg" style="display:none">

  <!-- URL 설정 -->
  <div class="sec-label">구글 시트 연동</div>
  <div class="url-card">
    <div class="url-card-title">📊 Apps Script 웹앱 URL</div>
    <input class="url-input" id="urlInput" placeholder="https://script.google.com/macros/s/...">
    <button class="url-save" onclick="saveUrl()">저장</button>
  </div>

  <!-- 상품 등록 -->
  <div class="sec-label" style="margin-top:8px">상품 등록 / 묶음단위 설정</div>
  <div class="prod-search-row">
    <input class="prod-search" id="prodSearch" placeholder="상품명 또는 바코드 검색" oninput="renderProducts()">
    <button class="add-prod-btn" onclick="addNewProduct()">+ 신규</button>
  </div>
  <div id="prod-list"></div>
</div>

<!-- ══ Camera ══ -->
<div class="camera-wrap" id="camWrap">
  <div id="scanner-view">
    <div class="scan-ui">
      <div class="scan-frame">
        <div class="scan-line"></div>
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
      </div>
      <div class="scan-hint">바코드를 프레임 안에 맞춰주세요</div>
    </div>
  </div>
  <div class="cam-mode-badge" id="camBadge"></div>
  <button class="cam-close" onclick="closeCam()">✕</button>
  <div class="cam-bottom">
    <input class="cam-input" id="camManual" placeholder="바코드 직접 입력" inputmode="numeric">
    <button class="cam-ok" onclick="manualScan()">확인</button>
  </div>
</div>

<!-- Confirm Bars -->
<div class="confirm-bar" id="cb-in">
  <div class="cb-summary" id="cb-in-summary"></div>
  <button class="cb-btn in" id="cb-in-btn" onclick="commitAll('in')">
    <div class="spinner" id="spin-in"></div>
    <span id="cb-in-txt">✅ 입고 전체 확정</span>
  </button>
</div>
<div class="confirm-bar" id="cb-out">
  <div class="cb-summary" id="cb-out-summary"></div>
  <button class="cb-btn out" id="cb-out-btn" onclick="commitAll('out')">
    <div class="spinner" id="spin-out"></div>
    <span id="cb-out-txt">✅ 출고 전체 확정</span>
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Nav -->
<div class="nav">
  <button class="nav-btn" id="nav-in"   onclick="goMode('in')">  <div class="nav-icon">📦</div><div class="nav-label">입고</div></button>
  <button class="nav-btn" id="nav-out"  onclick="goMode('out')"> <div class="nav-icon">📤</div><div class="nav-label">출고</div></button>
  <button class="nav-btn" id="nav-hist" onclick="goMode('hist')"><div class="nav-icon">📋</div><div class="nav-label">이력</div></button>
  <button class="nav-btn" id="nav-cfg"  onclick="goMode('cfg')"> <div class="nav-icon">⚙️</div><div class="nav-label">설정</div></button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let mode = 'in';
let scanMode = 'in';
let isScanning = false;

// 상품 마스터 { barcode: { barcode, name, unitQty, unitLabel, stock } }
let products = JSON.parse(localStorage.getItem('phProducts') || '{}');

// 입출고 대기 리스트 [ { id, barcode, name, unitQty, unitLabel, boxes, units, isNew, nameEdited } ]
let pendingIn  = [];
let pendingOut = [];

// 이력
let histLog = JSON.parse(localStorage.getItem('phHistory') || '[]');

// 구글 시트 URL
let sheetUrl = localStorage.getItem('phSheetUrl') || '';

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
function init() {
  goMode('in');
  updateSheetStatus();
  if (sheetUrl) document.getElementById('urlInput').value = sheetUrl;
  renderProducts();
}

// ═══════════════════════════════════════════════════════════════════
// MODE
// ═══════════════════════════════════════════════════════════════════
function goMode(m) {
  mode = m;
  ['in','out','hist','cfg'].forEach(x => {
    document.getElementById('view-'+x).style.display = 'none';
    document.getElementById('tab-'+x).className = 'tab';
    document.getElementById('nav-'+x).className = 'nav-btn';
    if (x === 'in' || x === 'out') {
      document.getElementById('cb-'+x).classList.remove('show');
    }
  });
  document.getElementById('view-'+m).style.display = 'block';
  const activeClass = { in:'a-in', out:'a-out', hist:'a-hist', cfg:'a-cfg' }[m];
  const tabActive   = { in:'active-in', out:'active-out', hist:'active-hist', cfg:'active-cfg' }[m];
  document.getElementById('tab-'+m).classList.add(tabActive);
  document.getElementById('nav-'+m).classList.add(activeClass);

  if (m === 'in' || m === 'out') renderPending(m);
  if (m === 'hist') renderHistory();
  if (m === 'cfg')  renderProducts();
}

// ═══════════════════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════════════════
function openCam(m) {
  scanMode = m;
  document.getElementById('camWrap').classList.add('open');
  document.getElementById('camManual').value = '';
  const badge = document.getElementById('camBadge');
  badge.textContent = m === 'in' ? '📦 입고 스캔' : '📤 출고 스캔';
  badge.className = 'cam-mode-badge ' + m;
  startQuagga();
}
function closeCam() {
  document.getElementById('camWrap').classList.remove('open');
  if (isScanning) { try { Quagga.stop(); } catch(e){} isScanning = false; }
}
function startQuagga() {
  if (isScanning) return;
  Quagga.init({
    inputStream: { name:'Live', type:'LiveStream', target:document.getElementById('scanner-view'),
      constraints:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} } },
    decoder: { readers:['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader'] },
    locate: true
  }, err => {
    if (err) { showToast('카메라 접근 실패. 수동 입력 사용', 'err'); return; }
    Quagga.start(); isScanning = true;
  });
  let lastCode = '', lastTime = 0;
  Quagga.onDetected(result => {
    const code = result.codeResult.code;
    const now = Date.now();
    if (code === lastCode && now - lastTime < 2000) return;
    lastCode = code; lastTime = now;
    if (navigator.vibrate) navigator.vibrate(60);
    closeCam();
    addScan(code);
  });
}
function manualScan() {
  const code = document.getElementById('camManual').value.trim();
  if (!code) return;
  closeCam();
  addScan(code);
}

// ═══════════════════════════════════════════════════════════════════
// SCAN → PENDING
// ═══════════════════════════════════════════════════════════════════
function addScan(barcode) {
  const prod = products[barcode];
  const list = scanMode === 'in' ? pendingIn : pendingOut;

  // 이미 목록에 있으면 수량 +1 묶음
  const existing = list.find(x => x.barcode === barcode);
  if (existing) {
    existing.boxes = (existing.boxes || 0) + 1;
    renderPending(scanMode);
    showToast(`📦 ${existing.name} 묶음 +1`, 'ok');
    return;
  }

  const item = {
    id: Date.now() + Math.random(),
    barcode,
    name: prod ? prod.name : '',
    unitQty: prod ? (prod.unitQty || 1) : 1,
    unitLabel: prod ? (prod.unitLabel || '묶음') : '묶음',
    boxes: prod ? 1 : 0,
    units: prod ? 0 : 1,
    stock: prod ? (prod.stock || 0) : 0,
    isNew: !prod,
  };
  list.push(item);
  renderPending(scanMode);
  if (scanMode === 'in' || scanMode === 'out') goMode(scanMode);
}

// ═══════════════════════════════════════════════════════════════════
// RENDER PENDING
// ═══════════════════════════════════════════════════════════════════
function renderPending(m) {
  const list = m === 'in' ? pendingIn : pendingOut;
  const container = document.getElementById(m + '-list');
  const emptyEl   = document.getElementById(m + '-empty');
  const headerEl  = document.getElementById(m + '-pending-header');
  const countEl   = document.getElementById(m + '-count');
  const cbEl      = document.getElementById('cb-' + m);
  const cbSum     = document.getElementById('cb-' + m + '-summary');

  if (!list.length) {
    container.innerHTML = '';
    emptyEl.style.display = 'block';
    headerEl.style.display = 'none';
    cbEl.classList.remove('show');
    return;
  }

  emptyEl.style.display = 'none';
  headerEl.style.display = 'flex';
  countEl.textContent = list.length + '개 품목';
  cbEl.classList.add('show');

  // summary
  const totalItems = list.reduce((s, x) => s + calcTotal(x), 0);
  cbSum.innerHTML = `<strong>${list.length}개 품목</strong> · 총 <strong>${totalItems}개</strong> ${m === 'in' ? '입고' : '출고'} 예정`;

  container.innerHTML = list.map((item, idx) => {
    const total = calcTotal(item);
    const hasUnit = item.unitQty > 1;
    const isOut = m === 'out';
    const stockWarn = isOut && item.stock < total;

    return `
    <div class="pending-item ${m}-item" id="pi-${item.id}">
      <div class="pi-top">
        <div class="pi-icon">${item.isNew ? '🆕' : (m === 'in' ? '📦' : '📤')}</div>
        <div class="pi-info">
          ${item.isNew
            ? `<input class="pi-name-input" id="name-${item.id}" placeholder="상품명 입력" value="${escHtml(item.name)}" onchange="updateName('${m}','${item.id}',this.value)">`
            : `<div class="pi-name">${escHtml(item.name)}</div>`}
          <div class="pi-barcode">${escHtml(item.barcode)}${isOut ? ` · 재고 ${item.stock}개` : ''}</div>
        </div>
        <div class="pi-actions">
          <button class="pi-edit-btn" onclick="toggleEdit('${item.id}')" title="단위설정">🔧</button>
          <button class="pi-del-btn"  onclick="removeItem('${m}','${item.id}')" title="삭제">✕</button>
        </div>
      </div>

      <div class="pi-body">
        ${hasUnit ? `
        <div class="qty-unit">
          <div class="qty-unit-label">${escHtml(item.unitLabel || '묶음')} (×${item.unitQty})</div>
          <div class="qty-stepper">
            <button class="qs-btn" onclick="adjQty('${m}','${item.id}','boxes',-1)">−</button>
            <input class="qs-val" id="boxes-${item.id}" type="number" value="${item.boxes}" min="0"
              onchange="setQty('${m}','${item.id}','boxes',this.value)">
            <button class="qs-btn" onclick="adjQty('${m}','${item.id}','boxes',1)">+</button>
          </div>
        </div>` : ''}
        <div class="qty-unit">
          <div class="qty-unit-label">낱개</div>
          <div class="qty-stepper">
            <button class="qs-btn" onclick="adjQty('${m}','${item.id}','units',-1)">−</button>
            <input class="qs-val" id="units-${item.id}" type="number" value="${item.units}" min="0"
              onchange="setQty('${m}','${item.id}','units',this.value)">
            <button class="qs-btn" onclick="adjQty('${m}','${item.id}','units',1)">+</button>
          </div>
        </div>
        <div class="pi-total ${stockWarn ? 'stock-warn' : ''}">
          합계 <strong style="color:${stockWarn ? 'var(--red)' : 'var(--text)'}">${total}</strong>개
          ${stockWarn ? `<span style="color:var(--red);font-size:10px;display:block">⚠ 재고부족</span>` : ''}
        </div>
      </div>

      <!-- edit panel -->
      <div class="pi-edit-panel" id="ep-${item.id}">
        <div class="ep-row">
          <div class="ep-label">묶음 단위명</div>
          <input class="ep-input" id="ep-label-${item.id}" value="${escHtml(item.unitLabel || '묶음')}" placeholder="예: 박스, 보틀">
        </div>
        <div class="ep-row">
          <div class="ep-label">묶음당 낱개</div>
          <input class="ep-input" id="ep-uqty-${item.id}" type="number" value="${item.unitQty}" min="1" placeholder="예: 30">
        </div>
        <button class="ep-save" onclick="saveEditPanel('${m}','${item.id}')">묶음단위 저장 (이 제품에 적용)</button>
      </div>
    </div>`;
  }).join('');
}

function calcTotal(item) {
  return (item.boxes || 0) * (item.unitQty || 1) + (item.units || 0);
}

function updateName(m, id, val) {
  const list = m === 'in' ? pendingIn : pendingOut;
  const item = list.find(x => String(x.id) === String(id));
  if (item) item.name = val;
}

function adjQty(m, id, field, delta) {
  const list = m === 'in' ? pendingIn : pendingOut;
  const item = list.find(x => String(x.id) === String(id));
  if (!item) return;
  item[field] = Math.max(0, (item[field] || 0) + delta);
  // live update inputs
  const el = document.getElementById(field + '-' + id);
  if (el) el.value = item[field];
  // live update total
  renderPendingTotal(m, id, item);
}

function setQty(m, id, field, val) {
  const list = m === 'in' ? pendingIn : pendingOut;
  const item = list.find(x => String(x.id) === String(id));
  if (!item) return;
  item[field] = Math.max(0, parseInt(val) || 0);
  renderPendingTotal(m, id, item);
}

function renderPendingTotal(m, id, item) {
  // just update the total display without full re-render
  const total = calcTotal(item);
  const isOut = m === 'out';
  const stockWarn = isOut && item.stock < total;
  const piEl = document.getElementById('pi-' + id);
  if (!piEl) return;
  const totEl = piEl.querySelector('.pi-total');
  if (totEl) {
    totEl.innerHTML = `합계 <strong style="color:${stockWarn ? 'var(--red)' : 'var(--text)'}">${total}</strong>개${stockWarn ? `<span style="color:var(--red);font-size:10px;display:block">⚠ 재고부족</span>` : ''}`;
  }
  // update confirm bar summary
  const list = m === 'in' ? pendingIn : pendingOut;
  const totalItems = list.reduce((s, x) => s + calcTotal(x), 0);
  const cbSum = document.getElementById('cb-' + m + '-summary');
  if (cbSum) cbSum.innerHTML = `<strong>${list.length}개 품목</strong> · 총 <strong>${totalItems}개</strong> ${m === 'in' ? '입고' : '출고'} 예정`;
}

function toggleEdit(id) {
  const ep = document.getElementById('ep-' + id);
  if (ep) ep.classList.toggle('open');
}

function saveEditPanel(m, id) {
  const list = m === 'in' ? pendingIn : pendingOut;
  const item = list.find(x => String(x.id) === String(id));
  if (!item) return;
  const label = document.getElementById('ep-label-' + id).value.trim() || '묶음';
  const uqty  = Math.max(1, parseInt(document.getElementById('ep-uqty-' + id).value) || 1);
  item.unitLabel = label;
  item.unitQty   = uqty;
  // save to product master too
  if (!item.isNew && products[item.barcode]) {
    products[item.barcode].unitLabel = label;
    products[item.barcode].unitQty   = uqty;
    saveProducts();
  }
  renderPending(m);
  showToast('묶음단위 저장됨', 'ok');
}

function removeItem(m, id) {
  if (m === 'in')  pendingIn  = pendingIn.filter(x => String(x.id) !== String(id));
  else             pendingOut = pendingOut.filter(x => String(x.id) !== String(id));
  renderPending(m);
}

function clearAll(m) {
  if (!confirm('목록을 전체 삭제할까요?')) return;
  if (m === 'in') pendingIn = []; else pendingOut = [];
  renderPending(m);
}

// ═══════════════════════════════════════════════════════════════════
// COMMIT ALL
// ═══════════════════════════════════════════════════════════════════
async function commitAll(m) {
  const list = m === 'in' ? pendingIn : pendingOut;
  if (!list.length) return;

  // validation
  for (const item of list) {
    if (item.isNew && !item.name.trim()) {
      showToast('상품명을 입력하세요', 'err');
      return;
    }
    const total = calcTotal(item);
    if (total <= 0) {
      showToast(`${item.name || item.barcode}: 수량이 0입니다`, 'err');
      return;
    }
    if (m === 'out' && item.stock < total) {
      showToast(`⚠ ${item.name}: 재고 부족 (재고 ${item.stock}개)`, 'err');
      return;
    }
  }

  // loading
  const btn  = document.getElementById('cb-' + m + '-btn');
  const spin = document.getElementById('spin-' + m);
  const txt  = document.getElementById('cb-' + m + '-txt');
  btn.disabled = true;
  spin.style.display = 'block';
  txt.textContent = '저장 중...';

  const now = new Date();
  const records = [];

  for (const item of list) {
    const total = calcTotal(item);
    const prevStock = item.stock || 0;
    const newStock  = m === 'in' ? prevStock + total : prevStock - total;
    const name = item.name.trim();

    // update local master
    products[item.barcode] = {
      barcode: item.barcode,
      name,
      unitQty:   item.unitQty,
      unitLabel: item.unitLabel,
      stock:     newStock
    };

    const rec = {
      barcode: item.barcode,
      name,
      type: m,
      boxes: item.boxes,
      units: item.units,
      unitQty: item.unitQty,
      unitLabel: item.unitLabel,
      total,
      prevStock,
      newStock,
      time: now.toISOString()
    };
    records.push(rec);

    // history log
    histLog.unshift(rec);
    if (histLog.length > 300) histLog.pop();
  }

  saveProducts();
  localStorage.setItem('phHistory', JSON.stringify(histLog));

  // Google Sheet
  let sheetOk = false;
  if (sheetUrl) {
    try {
      const res = await fetch(sheetUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'batchUpdate', records })
      });
      const data = await res.json();
      sheetOk = data.success;
    } catch(e) {}
  }

  // reset
  btn.disabled = false;
  spin.style.display = 'none';
  txt.textContent = m === 'in' ? '✅ 입고 전체 확정' : '✅ 출고 전체 확정';

  const cleared = [...list];
  if (m === 'in') pendingIn = []; else pendingOut = [];
  renderPending(m);

  const suffix = sheetUrl ? (sheetOk ? ' · 시트 반영됨' : ' · 오프라인 저장') : '';
  showToast(`${m==='in'?'📦입고':'📤출고'} ${cleared.length}개 품목 저장완료${suffix}`, 'ok');
}

// ═══════════════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════════════
function renderHistory() {
  const today = new Date().toDateString();
  const todayLogs = histLog.filter(r => new Date(r.time).toDateString() === today);
  const el = document.getElementById('hist-list');
  document.getElementById('hist-count').textContent = todayLogs.length ? `(${todayLogs.length}건)` : '';

  if (!todayLogs.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">오늘의 이력이 없습니다</div></div>`;
    return;
  }
  el.innerHTML = todayLogs.map(r => {
    const t = new Date(r.time).toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
    const boxPart = r.boxes > 0 ? `${r.unitLabel||'묶음'}×${r.boxes}` : '';
    const unitPart = r.units > 0 ? `낱개×${r.units}` : '';
    const detail = [boxPart, unitPart].filter(Boolean).join(' + ');
    return `
    <div class="hist-item">
      <div class="hi-badge ${r.type}">${r.type==='in'?'📦':'📤'}</div>
      <div class="hi-body">
        <div class="hi-name">${escHtml(r.name)}</div>
        <div class="hi-meta">${t} · ${detail} · 재고 ${r.prevStock}→${r.newStock}</div>
      </div>
      <div class="hi-qty ${r.type}">${r.type==='in'?'+':'-'}${r.total}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════
// PRODUCT MASTER
// ═══════════════════════════════════════════════════════════════════
function saveProducts() { localStorage.setItem('phProducts', JSON.stringify(products)); }

function renderProducts() {
  const q = (document.getElementById('prodSearch')?.value || '').toLowerCase();
  const el = document.getElementById('prod-list');
  const list = Object.values(products).filter(p =>
    !q || p.name.toLowerCase().includes(q) || p.barcode.includes(q)
  );
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">등록된 상품이 없습니다<br>바코드 스캔 시 신규 등록됩니다</div></div>`;
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="prod-card" id="pc-${p.barcode}">
      <div class="prod-card-header" onclick="toggleProdCard('${p.barcode}')">
        <div>
          <div class="prod-card-name">${escHtml(p.name)}</div>
          <div class="prod-card-bc">${p.barcode} · 재고 ${p.stock||0}개</div>
        </div>
        <div class="prod-card-arrow">▾</div>
      </div>
      <div class="prod-card-body">
        <div class="pf-row">
          <div class="pf-label">상품명</div>
          <input class="pf-input" id="pf-name-${p.barcode}" value="${escHtml(p.name)}">
        </div>
        <div class="pf-row">
          <div class="pf-label">바코드</div>
          <input class="pf-input" id="pf-bc-${p.barcode}" value="${p.barcode}">
        </div>
        <div class="pf-row">
          <div class="pf-label">묶음 단위명</div>
          <input class="pf-input" id="pf-label-${p.barcode}" value="${escHtml(p.unitLabel||'묶음')}" placeholder="박스, 보틀 등">
        </div>
        <div class="pf-row">
          <div class="pf-label">묶음당 낱개</div>
          <input class="pf-input" id="pf-uqty-${p.barcode}" type="number" value="${p.unitQty||1}" min="1">
        </div>
        <div class="pf-row">
          <div class="pf-label">현재 재고</div>
          <input class="pf-input" id="pf-stock-${p.barcode}" type="number" value="${p.stock||0}" min="0">
        </div>
        <div class="pf-row-btns">
          <button class="pf-save" onclick="saveProdCard('${p.barcode}')">저장</button>
          <button class="pf-del"  onclick="delProduct('${p.barcode}')">삭제</button>
        </div>
      </div>
    </div>`).join('');
}

function toggleProdCard(bc) {
  document.getElementById('pc-' + bc)?.classList.toggle('expanded');
}

function saveProdCard(bc) {
  const name    = document.getElementById('pf-name-' + bc).value.trim();
  const newBc   = document.getElementById('pf-bc-' + bc).value.trim();
  const label   = document.getElementById('pf-label-' + bc).value.trim() || '묶음';
  const uqty    = Math.max(1, parseInt(document.getElementById('pf-uqty-' + bc).value) || 1);
  const stock   = Math.max(0, parseInt(document.getElementById('pf-stock-' + bc).value) || 0);
  if (!name || !newBc) { showToast('상품명과 바코드를 입력하세요', 'err'); return; }
  if (newBc !== bc) delete products[bc];
  products[newBc] = { barcode:newBc, name, unitLabel:label, unitQty:uqty, stock };
  saveProducts();
  renderProducts();
  showToast(`${name} 저장됨`, 'ok');
}

function delProduct(bc) {
  if (!confirm(`${products[bc]?.name || bc}를 삭제할까요?`)) return;
  delete products[bc];
  saveProducts();
  renderProducts();
}

function addNewProduct() {
  const bc = 'NEW-' + Date.now();
  products[bc] = { barcode:bc, name:'', unitLabel:'묶음', unitQty:1, stock:0 };
  saveProducts();
  renderProducts();
  // open the new card
  setTimeout(() => {
    document.getElementById('pc-'+bc)?.classList.add('expanded');
    document.getElementById('pf-name-'+bc)?.focus();
  }, 50);
}

// ═══════════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════════
function saveUrl() {
  const url = document.getElementById('urlInput').value.trim();
  sheetUrl = url;
  localStorage.setItem('phSheetUrl', url);
  updateSheetStatus();
  showToast(url ? '✅ 구글 시트 연결됨' : '연결 해제됨', url ? 'ok' : '');
}
function updateSheetStatus() {
  document.getElementById('sheetDot').className = 'dot' + (sheetUrl ? ' on' : '');
  document.getElementById('sheetTxt').textContent = sheetUrl ? '시트 연결됨' : '시트 연결';
}

// ═══════════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════════
let _toastT;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => { el.className = 'toast'; }, 3200);
}

// ═══════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
